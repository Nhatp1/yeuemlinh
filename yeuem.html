<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi người anh yêu ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.card {
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    max-width: 90%;
    text-align: center;
    animation: fadeIn 2s ease;
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

p {
    font-size: 17px;
    line-height: 1.7;
}

.heart {
    font-size: 55px;
    margin: 15px 0;
    animation: beat 1s infinite;
}

footer {
    margin-top: 15px;
    font-size: 16px;
    opacity: 0.9;
}

/* Tim bay */
.floating-heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    color: rgba(255,255,255,0.8);
}

/* Hoa rơi */
.flower {
    position: fixed;
    top: -10px;
    font-size: 18px;
    animation: fall 8s linear infinite;
    color: rgba(255,255,255,0.8);
}

@keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.3); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-110vh); opacity: 0; }
}

@keyframes fall {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎵 Nhạc nền (đổi link nếu muốn) -->
<audio autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_8b9d9e3d44.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>Gửi <b>Em Yêu</b> của anh ❤️</h1>

    <div class="heart">💖</div>

    <p>
        Từ khi có em, thế giới của anh trở nên dịu dàng hơn.  
        Cảm ơn em vì đã đến, đã ở lại và đã yêu anh theo cách rất riêng 💕
    </p>

    <p>
        Anh mong rằng mỗi ngày trôi qua,  
        chúng ta vẫn chọn nhau, yêu nhau và nắm tay thật chặt 🥰
    </p>

    <footer>
        — Anh yêu em rất nhiều 💞
    </footer>
</div>

<script>
// Tim bay
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "floating-heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 7000);
}, 400);

// Hoa rơi
setInterval(() => {
    const flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (5 + Math.random() * 4) + "s";
    document.body.appendChild(flower);

    setTimeout(() => flower.remove(), 9000);
}, 700);
</script>

</body>
</html>
